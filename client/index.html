<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-container animate-in delay-1">
        <h1>Monopoly</h1>
        
        <div class="tabs">
            <button id="tab-login" class="active">Login</button>
            <button id="tab-register">Register</button>
        </div>

        <form id="auth-form">
            <div class="form-group">
                <label for="username"><i data-lucide="user" style="width:16px; height:16px; margin-bottom:-3px;"></i> Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password"><i data-lucide="lock" style="width:16px; height:16px; margin-bottom:-3px;"></i> Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <div id="error-msg" class="error"></div>
            <button type="submit" id="submit-btn">Login</button>
        </form>
    </div>
    <script src="js/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
